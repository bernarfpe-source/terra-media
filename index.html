<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terra-Media: Aventura 3D - Babylon.js</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.0.0/babylon.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; color:#fff; }
#renderCanvas { width:100%; height:100vh; touch-action:none; display:block; }
#intro-screen { position:absolute; top:0; left:0; width:100%; height:100%; z-index:200; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#intro-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
#intro-overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; z-index:10; }
#intro-title { text-align:center; opacity:0; transition:opacity 2s; }
#intro-tagline { opacity:0; transition:opacity 2s; }
#intro-heroes { opacity:0; transition:opacity 1s; display:flex; gap:15px; pointer-events:auto; }
.intro-card { text-align:center; cursor:pointer; padding:15px 20px; background:rgba(0,0,0,0.7); border:2px solid #555; border-radius:10px; transition:all 0.3s; }
.intro-card:hover { border-color:#FFD700; transform:translateY(-5px); box-shadow:0 8px 25px rgba(255,215,0,0.3); }
#hud { display:none; position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50; }
#hud * { pointer-events:auto; }
#top-bar { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); border:1px solid #444; border-radius:8px; padding:8px 12px; }
#top-bar h3 { color:#FFD700; font-size:14px; margin-bottom:4px; }
.bar-container { width:180px; height:14px; background:#222; border-radius:7px; margin:3px 0; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:7px; transition:width 0.3s; }
#hp-bar .bar-fill { background:linear-gradient(to right,#440000,#CC0000); }
#mp-bar .bar-fill { background:linear-gradient(to right,#000044,#0044CC); }
.bar-label { position:absolute; top:0; left:0; width:100%; text-align:center; font-size:10px; line-height:14px; color:#fff; text-shadow:1px 1px 1px #000; }
#xp-bar { width:180px; height:8px; background:#222; border-radius:4px; margin-top:4px; }
#xp-fill { height:100%; background:linear-gradient(to right,#444400,#AAAA00); border-radius:4px; width:0%; transition:width 0.3s; }
#level-label { color:#FFD700; font-size:11px; margin-top:2px; }
#skills-bar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; }
.skill-btn { width:50px; height:50px; background:rgba(0,0,0,0.8); border:2px solid #555; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; }
.skill-btn:hover { border-color:#FFD700; }
.skill-btn .icon { font-size:20px; }
.skill-btn .key { font-size:9px; color:#aaa; }
.skill-btn .cd-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); border-radius:6px; display:none; }
#enemy-info { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:2px solid #880000; border-radius:8px; padding:6px 16px; display:none; text-align:center; }
#enemy-info h4 { color:#FF4444; font-size:13px; }
#enemy-hp-bar { width:200px; height:10px; background:#333; border-radius:5px; margin-top:4px; }
#enemy-hp-fill { height:100%; background:linear-gradient(to right,#880000,#FF2200); border-radius:5px; transition:width 0.2s; }
#msg-log { position:absolute; bottom:90px; left:20px; max-width:300px; pointer-events:none; }
.msg { color:#fff; font-size:12px; padding:3px 0; opacity:1; transition:opacity 1s; text-shadow:1px 1px 2px #000; }
#crosshair { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:55; }
#minimap { position:absolute; top:10px; right:10px; width:140px; height:140px; border:2px solid #444; border-radius:4px; background:rgba(0,0,0,0.5); }
#new-char-btn { position:absolute; top:10px; right:160px; padding:6px 12px; background:rgba(0,0,0,0.7); color:#FFD700; border:1px solid #FFD700; border-radius:6px; cursor:pointer; font-size:11px; }
#dialog-box { display:none; position:absolute; bottom:100px; left:50%; transform:translateX(-50%); width:500px; background:rgba(0,0,0,0.9); border:2px solid #FFD700; border-radius:10px; padding:15px; text-align:center; }
#dialog-box h3 { color:#FFD700; margin-bottom:8px; }
#dialog-box p { color:#ccc; font-size:13px; margin-bottom:10px; }
#dialog-box button { padding:8px 20px; background:#333; color:#FFD700; border:1px solid #FFD700; border-radius:6px; cursor:pointer; margin:0 5px; }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<div id="intro-screen">
    <canvas id="intro-canvas"></canvas>
    <div id="intro-overlay">
        <div id="intro-title">
            <div style="color:#ddd;font-size:0.9rem;letter-spacing:4px;margin-bottom:8px;text-shadow:0 0 10px #000;">UMA JORNADA PELA</div>
            <div style="color:#FFD700;font-size:3.5rem;font-weight:bold;text-shadow:0 0 30px rgba(255,150,0,0.6),0 4px 8px rgba(0,0,0,0.8);letter-spacing:6px;">TERRA-MEDIA</div>
            <div style="color:#FF6600;font-size:1.1rem;margin-top:10px;letter-spacing:3px;text-shadow:0 0 10px #000;">BABYLON.JS ENGINE</div>
        </div>
        <div id="intro-tagline" style="color:#ccc;font-size:0.9rem;margin-top:20px;font-style:italic;text-shadow:0 2px 4px #000;">Clique em um heroi para iniciar sua jornada</div>
        <div id="intro-heroes" style="margin-top:25px;">
            <div class="intro-card" data-char="0"><div style="color:#FFD700;font-size:1.1rem;font-weight:bold;">Bernardino</div><div style="color:#aaa;font-size:0.75rem;">Barbaro</div></div>
            <div class="intro-card" data-char="1"><div style="color:#4488FF;font-size:1.1rem;font-weight:bold;">Bernardo</div><div style="color:#aaa;font-size:0.75rem;">Guerreiro</div></div>
            <div class="intro-card" data-char="2"><div style="color:#44AA44;font-size:1.1rem;font-weight:bold;">Raphael</div><div style="color:#aaa;font-size:0.75rem;">Arqueiro</div></div>
            <div class="intro-card" data-char="3"><div style="color:#CC44FF;font-size:1.1rem;font-weight:bold;">Leticia</div><div style="color:#aaa;font-size:0.75rem;">Maga Elfica</div></div>
        </div>
    </div>
</div>

<div id="hud">
    <button id="new-char-btn" onclick="resetGame()">Novo Personagem</button>
    <div id="top-bar">
        <h3 id="hud-name">Heroi</h3>
        <div class="bar-container" id="hp-bar"><div class="bar-fill" style="width:100%"></div><div class="bar-label">100/100</div></div>
        <div class="bar-container" id="mp-bar"><div class="bar-fill" style="width:100%"></div><div class="bar-label">50/50</div></div>
        <div id="xp-bar"><div id="xp-fill"></div></div>
        <div id="level-label">Nivel 1</div>
    </div>
    <div id="enemy-info"><h4 id="enemy-name">Inimigo</h4><div id="enemy-hp-bar"><div id="enemy-hp-fill" style="width:100%"></div></div></div>
    <div id="skills-bar">
        <div class="skill-btn" data-skill="0"><span class="icon">&#x2694;&#xFE0F;</span><span class="key">1</span><div class="cd-overlay"></div></div>
        <div class="skill-btn" data-skill="1"><span class="icon">&#x1F525;</span><span class="key">2</span><div class="cd-overlay"></div></div>
        <div class="skill-btn" data-skill="2"><span class="icon">&#x1F4AB;</span><span class="key">3</span><div class="cd-overlay"></div></div>
        <div class="skill-btn" data-skill="3"><span class="icon">&#x2764;&#xFE0F;</span><span class="key">4</span><div class="cd-overlay"></div></div>
    </div>
    <div id="msg-log"></div>
    <canvas id="minimap" width="140" height="140"></canvas>
    <div id="crosshair"><div style="width:24px;height:24px;position:relative;"><div style="position:absolute;top:11px;left:0;width:10px;height:2px;background:#0f0;"></div><div style="position:absolute;top:11px;right:0;width:10px;height:2px;background:#0f0;"></div><div style="position:absolute;left:11px;top:0;width:2px;height:10px;background:#0f0;"></div><div style="position:absolute;left:11px;bottom:0;width:2px;height:10px;background:#0f0;"></div></div></div>
    <div id="dialog-box"><h3 id="dialog-name"></h3><p id="dialog-text"></p><button id="dialog-accept">Aceitar</button><button id="dialog-close">Fechar</button></div>
</div>

<script>
// ── GAME DATA ──
const heroData = [
    { name:'Bernardino', cls:'Barbaro', hp:120, mp:30, atk:18, def:8, spd:5, color:'#8B4513', skills:['Golpe Brutal','Furia','Grito de Guerra','Regenerar'] },
    { name:'Bernardo', cls:'Guerreiro', hp:150, mp:40, atk:14, def:14, spd:4, color:'#2255CC', skills:['Investida','Escudo','Provocar','Cura Divina'] },
    { name:'Raphael', cls:'Arqueiro', hp:90, mp:50, atk:16, def:6, spd:7, color:'#44AA44', skills:['Flecha Rapida','Chuva de Flechas','Armadilha','Evasao'] },
    { name:'Leticia', cls:'Maga', hp:80, mp:80, atk:20, def:5, spd:4, color:'#CC44FF', skills:['Bola de Fogo','Nevasca','Raio','Cura Arcana'] }
];

let selectedChar = 0, gameStarted = false;
let player = null, enemies = [], npcs = [], targetEnemy = null;
let engine, scene, camera, playerMesh;
let shadowGen;

// ── INTRO (uses separate canvas) ──
(function() {
    const canvas = document.getElementById('intro-canvas');
    const introEngine = new BABYLON.Engine(canvas, true);
    const introScene = new BABYLON.Scene(introEngine);
    introScene.clearColor = new BABYLON.Color4(0.04, 0.02, 0.02, 1);

    const introCam = new BABYLON.ArcRotateCamera('introCam', 0, 1.2, 80, new BABYLON.Vector3(0, 30, -30), introScene);

    // Dark lighting
    const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), introScene);
    hemi.intensity = 0.15;
    hemi.diffuse = new BABYLON.Color3(0.3, 0.1, 0.05);

    // Ground
    const ground = BABYLON.MeshBuilder.CreateGround('ground', {width:200, height:200}, introScene);
    const gMat = new BABYLON.PBRMaterial('gMat', introScene);
    gMat.albedoColor = new BABYLON.Color3(0.03, 0.02, 0.02);
    gMat.roughness = 1; gMat.metallic = 0;
    ground.material = gMat;

    // Tower (Barad-dur)
    const towerMat = new BABYLON.PBRMaterial('towerMat', introScene);
    towerMat.albedoColor = new BABYLON.Color3(0.05, 0.05, 0.05);
    towerMat.roughness = 0.8; towerMat.metallic = 0.3;

    const tBase = BABYLON.MeshBuilder.CreateBox('tBase', {width:8, height:25, depth:8}, introScene);
    tBase.position.y = 12.5; tBase.material = towerMat;
    const tMid = BABYLON.MeshBuilder.CreateBox('tMid', {width:6, height:20, depth:6}, introScene);
    tMid.position.y = 30; tMid.material = towerMat;
    const tTop = BABYLON.MeshBuilder.CreateBox('tTop', {width:4, height:15, depth:4}, introScene);
    tTop.position.y = 45; tTop.material = towerMat;
    const tSpire = BABYLON.MeshBuilder.CreateCylinder('tSpire', {diameterTop:0, diameterBottom:4, height:12, tessellation:6}, introScene);
    tSpire.position.y = 58; tSpire.material = towerMat;

    // Eye of Sauron
    const eyeMat = new BABYLON.StandardMaterial('eyeMat', introScene);
    eyeMat.emissiveColor = new BABYLON.Color3(1, 0.3, 0);
    eyeMat.disableLighting = true;
    const eye = BABYLON.MeshBuilder.CreateBox('eye', {width:3, height:5, depth:0.5}, introScene);
    eye.position.y = 65; eye.material = eyeMat;
    const eyeInner = BABYLON.MeshBuilder.CreateBox('eyeIn', {width:1.5, height:3.5, depth:0.3}, introScene);
    eyeInner.position.y = 65;
    const eyeInMat = new BABYLON.StandardMaterial('eyeInMat', introScene);
    eyeInMat.emissiveColor = new BABYLON.Color3(1, 0.7, 0);
    eyeInMat.disableLighting = true;
    eyeInner.material = eyeInMat;
    const eyeLight = new BABYLON.PointLight('eyeLight', new BABYLON.Vector3(0, 65, 0), introScene);
    eyeLight.diffuse = new BABYLON.Color3(1, 0.3, 0);
    eyeLight.intensity = 5; eyeLight.range = 80;

    // One Ring
    const ring = BABYLON.MeshBuilder.CreateTorus('ring', {diameter:5, thickness:0.7, tessellation:32}, introScene);
    ring.position.set(0, 20, 25);
    const ringMat = new BABYLON.PBRMaterial('ringMat', introScene);
    ringMat.albedoColor = new BABYLON.Color3(1, 0.84, 0);
    ringMat.metallic = 1; ringMat.roughness = 0.2;
    ringMat.emissiveColor = new BABYLON.Color3(0.4, 0.25, 0);
    ring.material = ringMat;
    const ringLight = new BABYLON.PointLight('ringLight', new BABYLON.Vector3(0, 20, 25), introScene);
    ringLight.diffuse = new BABYLON.Color3(1, 0.7, 0);
    ringLight.intensity = 3; ringLight.range = 30;

    // Mountains
    for (let i = 0; i < 5; i++) {
        const mt = BABYLON.MeshBuilder.CreateCylinder('mt'+i, {diameterTop:0, diameterBottom:15+Math.random()*10, height:30+Math.random()*20, tessellation:6}, introScene);
        mt.position.set(-60+i*30, 10, -60+Math.random()*20);
        mt.material = towerMat;
    }

    // Particles (embers)
    const ps = new BABYLON.ParticleSystem('embers', 200, introScene);
    ps.particleTexture = new BABYLON.Texture('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAA0SURBVChTY/j//z8DAwMDIwMEMIEpBgYGRgYIYAJTDAwMjAwQwASmGBgYGBkggAlMAQMAAPkABf8JlLIAAAAASUVORK5CYII=', introScene);
    ps.emitter = new BABYLON.Vector3(0, 0, 0);
    ps.minEmitBox = new BABYLON.Vector3(-50, 0, -50);
    ps.maxEmitBox = new BABYLON.Vector3(50, 0, 50);
    ps.color1 = new BABYLON.Color4(1, 0.4, 0, 0.8);
    ps.color2 = new BABYLON.Color4(1, 0.6, 0, 0.6);
    ps.minSize = 0.1; ps.maxSize = 0.3;
    ps.minLifeTime = 3; ps.maxLifeTime = 6;
    ps.emitRate = 40;
    ps.direction1 = new BABYLON.Vector3(-0.5, 1, -0.5);
    ps.direction2 = new BABYLON.Vector3(0.5, 2, 0.5);
    ps.gravity = new BABYLON.Vector3(0, -0.1, 0);
    ps.start();

    let introTime = 0;
    introEngine.runRenderLoop(() => {
        introTime += 0.016;
        // Camera zoom toward eye
        const phase = Math.min(introTime / 30, 1);
        introCam.radius = 80 - phase * 55;
        introCam.beta = 1.2 - phase * 0.4;
        introCam.alpha += 0.002;
        introCam.target.y = 30 + phase * 30;
        // Ring animation
        ring.rotation.y += 0.015;
        ring.rotation.x = Math.sin(introTime * 0.6) * 0.2;
        ring.position.y = 20 + Math.sin(introTime * 0.8) * 1.5;
        ringLight.intensity = 2.5 + Math.sin(introTime * 2) * 1.5;
        // Eye pulse
        eye.scaling.x = 1 + Math.sin(introTime * 3) * 0.1;
        eye.scaling.y = 1 + Math.cos(introTime * 2) * 0.05;
        eyeLight.intensity = 4 + Math.sin(introTime * 2.5) * 2;
        eye.rotation.y = Math.sin(introTime * 0.4) * 0.4;
        eyeInner.rotation.y = eye.rotation.y;
        introScene.render();
    });

    // Fade in UI
    setTimeout(() => document.getElementById('intro-title').style.opacity = '1', 500);
    setTimeout(() => document.getElementById('intro-tagline').style.opacity = '1', 2500);
    setTimeout(() => document.getElementById('intro-heroes').style.opacity = '1', 3500);

    window.stopIntro = function() { introEngine.stopRenderLoop(); introEngine.dispose(); };
})();

// ── MAIN GAME ──
const MAP_SIZE = 100;
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function startGameWithChar(charIdx) {
    window.stopIntro();
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    selectedChar = charIdx;
    const h = heroData[selectedChar];
    player = { x:0, z:0, hp:h.hp, maxHp:h.hp, mp:h.mp, maxMp:h.mp, xp:0, xpNext:100, level:1, atk:h.atk, def:h.def, spd:h.spd, cooldowns:[0,0,0,0] };
    document.getElementById('hud-name').textContent = h.name + ' - ' + h.cls;
    initGame();
    gameStarted = true;
    addMessage('Bem-vindo, ' + h.name + '!');
    addMessage('WASD: mover | 1-4: skills | Clique: alvo');
}

function initGame() {
    const canvas = document.getElementById('renderCanvas');
    engine = new BABYLON.Engine(canvas, true);
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.4, 0.6, 0.9, 1);
    scene.ambientColor = new BABYLON.Color3(0.3, 0.3, 0.3);
    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
    scene.fogDensity = 0.003;
    scene.fogColor = new BABYLON.Color3(0.5, 0.6, 0.7);

    // Camera (3rd person follow)
    camera = new BABYLON.ArcRotateCamera('cam', Math.PI, 1.2, 18, BABYLON.Vector3.Zero(), scene);
    camera.lowerRadiusLimit = 8;
    camera.upperRadiusLimit = 40;
    camera.lowerBetaLimit = 0.3;
    camera.upperBetaLimit = 1.5;
    camera.attachControl(canvas, true);
    camera.inputs.attached.keyboard.detachControl();
    camera.inputs.attached.mousewheel.wheelPrecision = 20;

    // Lighting
    const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.5, -1, -0.3), scene);
    sun.intensity = 1.2;
    sun.diffuse = new BABYLON.Color3(1, 0.95, 0.8);
    const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
    hemi.intensity = 0.4;
    hemi.groundColor = new BABYLON.Color3(0.2, 0.15, 0.1);

    // Shadows
    shadowGen = new BABYLON.ShadowGenerator(2048, sun);
    shadowGen.useBlurExponentialShadowMap = true;
    shadowGen.blurKernel = 32;

    // Glow layer for magic effects
    const gl = new BABYLON.GlowLayer('glow', scene);
    gl.intensity = 0.6;

    // Image processing for tone mapping
    scene.imageProcessingConfiguration.toneMappingEnabled = true;
    scene.imageProcessingConfiguration.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
    scene.imageProcessingConfiguration.exposure = 1.2;
    scene.imageProcessingConfiguration.contrast = 1.3;

    createTerrain();
    createPlayer();
    spawnEnemies();
    spawnNPCs();
    setupInput();
    spawnLoot();

    // Add V and M key handlers
    window.addEventListener('keydown', e => {
        if (e.code === 'KeyV' && gameStarted) toggleFPMode();
        if (e.code === 'KeyM' && gameStarted) toggleMount();
    });

    engine.runRenderLoop(() => {
        if (!gameStarted) return;
        const dt = engine.getDeltaTime() / 1000;
        if (fpMode) updateFP(dt);
        else updatePlayer(dt);
        updateEnemies(dt);
        updateHUD();
        updateMinimap();
        checkLoot();
        updateRegion();
        updateDragonFire();
        if (mounted && mountMesh) {
            mountMesh.position.x = player.x;
            mountMesh.position.z = player.z;
            mountMesh.rotation.y = playerMesh.rotation.y;
        }
        if (Math.floor(Date.now()/2000) !== Math.floor((Date.now()-16)/2000)) updateMusic();
        scene.render();
    });

    window.addEventListener('resize', () => engine.resize());
}

// ── TERRAIN ──
function createTerrain() {
    // Ground with procedural grass texture
    const ground = BABYLON.MeshBuilder.CreateGround('ground', {width:MAP_SIZE*2, height:MAP_SIZE*2, subdivisions:60}, scene);
    const gMat = new BABYLON.PBRMaterial('gMat', scene);
   gMat.albedoColor = new BABYLON.Color3(0.2, 0.45, 0.12);
    const ctx = grassTex.getContext();
    // Base green
    ctx.fillStyle = '#2d5a1e';
    ctx.fillRect(0, 0, 512, 512);
    // Grass blades and variation
    for (let i = 0; i < 3000; i++) {
        const x = Math.random()*512, y = Math.random()*512;
        const g = Math.floor(60 + Math.random()*80);
        ctx.fillStyle = `rgb(${20+Math.floor(Math.random()*30)},${g},${10+Math.floor(Math.random()*20)})`;
        ctx.fillRect(x, y, 1+Math.random()*3, 4+Math.random()*8);
    }
    // Dirt patches
    for (let i = 0; i < 50; i++) {
        const x = Math.random()*512, y = Math.random()*512;
        ctx.fillStyle = `rgba(80,50,20,${0.2+Math.random()*0.3})`;
        ctx.beginPath();
        ctx.arc(x, y, 5+Math.random()*15, 0, Math.PI*2);
        ctx.fill();
    }
    grassTex.update();
    gMat.albedoTexture = grassTex;
    gMat.albedoTexture.uScale = 20;
    gMat.albedoTexture.vScale = 20;
    gMat.roughness = 0.95;
    gMat.metallic = 0;
    // Bump for depth
    const bumpTex = new BABYLON.DynamicTexture('bumpTex', 256, scene, false);
    const bCtx = bumpTex.getContext();
    for (let x=0; x<256; x++) for (let y=0; y<256; y++) {
        const v = Math.floor(128 + (Math.random()-0.5)*60);
        bCtx.fillStyle = `rgb(${v},${v},${v})`;
        bCtx.fillRect(x, y, 1, 1);
    }
    bumpTex.update();
    gMat.bumpTexture = bumpTex;
    gMat.bumpTexture.uScale = 20;
    gMat.bumpTexture.vScale = 20;
    gMat.bumpTexture.level = 0.3;
    ground.material = gMat;
    ground.receiveShadows = true;

    // Trees
    for (let i = 0; i < 80; i++) {
        const x = (Math.random()-0.5)*MAP_SIZE*1.8;
        const z = (Math.random()-0.5)*MAP_SIZE*1.8;
        if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
        createTree(x, z);
    }
    // Rocks
    for (let i = 0; i < 40; i++) {
        const x = (Math.random()-0.5)*MAP_SIZE*1.8;

function createTree(x, z) {
    const h = 3 + Math.random()*3;
    const trunk = BABYLON.MeshBuilder.CreateCylinder('trunk', {diameterTop:0.3, diameterBottom:0.6+Math.random()*0.3, height:h, tessellation:8}, scene);
    trunk.position.set(x, h/2, z);
    const tMat = new BABYLON.PBRMaterial('tMat'+x+z, scene);
    tMat.albedoColor = new BABYLON.Color3(0.25+Math.random()*0.1, 0.15+Math.random()*0.05, 0.05);
    tMat.roughness = 1; trunk.material = tMat;
    shadowGen.addShadowCaster(trunk);
    // Multiple leaf clusters for realism
    const leafCount = 2 + Math.floor(Math.random()*3);
    for (let i=0; i<leafCount; i++) {
        const lSize = 2 + Math.random()*2;
        const leaves = BABYLON.MeshBuilder.CreateSphere('leaves', {diameter:lSize, segments:5}, scene);
        leaves.position.set(x+(Math.random()-0.5)*1.5, h+1+i*0.8+Math.random(), z+(Math.random()-0.5)*1.5);
        const lMat = new BABYLON.PBRMaterial('lMat'+x+z+i, scene);

        lMat.roughness = 0.85; lMat.metallic = 0;

function createRock(x, z) {
    const w = 0.8+Math.random()*2.5, h = 0.5+Math.random()*1.8, d = 0.8+Math.random()*2.5;
    const rock = BABYLON.MeshBuilder.CreateBox('rock', {width:w, height:h, depth:d}, scene);
    rock.position.set(x, h/2, z);
    rock.rotation.set(Math.random()*0.3, Math.random()*Math.PI, Math.random()*0.2);
    const rMat = new BABYLON.PBRMaterial('rMat'+x+z, scene);
    const grey = 0.25+Math.random()*0.2;
    rMat.albedoColor = new BABYLON.Color3(grey, grey-0.02, grey-0.04);
    rMat.roughness = 0.85+Math.random()*0.15;
    rMat.metallic = 0.05;
    rock.material = rMat;
    shadowGen.addShadowCaster(rock);
    // Add smaller rocks around
    if (Math.random() > 0.5) {
        const small = BABYLON.MeshBuilder.CreateBox('srock', {width:w*0.4, height:h*0.3, depth:d*0.4}, scene);
        small.position.set(x+w*0.5, h*0.15, z+d*0.3);
        small.rotation.y = Math.random()*Math.PI;
        small.material = rMat;
    }
}

// ── INPUT ──
function setupInput() {
    const canvas = document.getElementById('renderCanvas');
    canvas.addEventListener('pointerdown', (evt) => {
        if (evt.button !== 0) return;
        const pickResult = scene.pick(scene.pointerX, scene.pointerY);
        if (pickResult.hit) {
            let found = null;
            enemies.forEach(e => {
                if (!e.alive) return;
                e.meshes.forEach(m => {
                    if (m === pickResult.pickedMesh) found = e;
                });
                // Also check parent
                if (pickResult.pickedMesh && pickResult.pickedMesh.parent) {
                    const parentName = pickResult.pickedMesh.parent.name || '';
                    if (parentName === e.mesh.name) found = e;
                }
            });
            if (found) {
                targetEnemy = found;
                showEnemyInfo(found);
                addMessage('Alvo: '+found.name);
            }
        }
    });
    window.addEventListener('keydown', e => {
        if (e.code === 'Digit1') useSkill(0);
        if (e.code === 'Digit2') useSkill(1);
        if (e.code === 'Digit3') useSkill(2);
        if (e.code === 'Digit4') useSkill(3);
        if (e.code === 'KeyE') interactNPC();
    });
}

let playerMoving = false;
function updatePlayer(dt) {
    const spd = player.spd * dt * 6;
    let mx = 0, mz = 0;
    // Get camera forward direction projected on XZ plane
    const camForward = camera.target.subtract(camera.position);
    camForward.y = 0;
    camForward.normalize();
    const camRight = BABYLON.Vector3.Cross(camForward, BABYLON.Vector3.Up());
    camRight.normalize();

    if (keys['KeyW']) { mx += camForward.x*spd; mz += camForward.z*spd; }
    if (keys['KeyS']) { mx -= camForward.x*spd; mz -= camForward.z*spd; }
    if (keys['KeyA']) { mx -= camRight.x*spd; mz -= camRight.z*spd; }
    if (keys['KeyD']) { mx += camRight.x*spd; mz += camRight.z*spd; }

    playerMoving = (mx !== 0 || mz !== 0);
    if (playerMoving) {
        player.x += mx; player.z += mz;
        playerMesh.position.x = player.x;
        playerMesh.position.z = player.z;
        playerMesh.rotation.y = Math.atan2(mx, mz);
    }
    camera.target.copyFrom(playerMesh.position);

    // Walk animation
    walkTime += dt * player.spd * 8;
    if (playerMoving) {
        const swing = Math.sin(walkTime) * 0.8;
        playerLimbs.lArmPivot.rotation.x = swing;
        playerLimbs.rArmPivot.rotation.x = -swing;
        playerLimbs.lLegPivot.rotation.x = -swing * 0.7;
        playerLimbs.rLegPivot.rotation.x = swing * 0.7;
    } else {
        const breath = Math.sin(walkTime * 0.5) * 0.06;
        playerLimbs.lArmPivot.rotation.x = breath;
        playerLimbs.rArmPivot.rotation.x = -breath;
        playerLimbs.lLegPivot.rotation.x *= 0.9;
        playerLimbs.rLegPivot.rotation.x *= 0.9;
    }

    // Cooldowns
    player.cooldowns = player.cooldowns.map(c => Math.max(0, c - dt));
}

    metalMat.albedoColor = new BABYLON.Color3(0.3, 0.3, 0.35); metalMat.metallic = 0.7; metalMat.roughness = 0.3;
    const meshes = [];

    if (data.type === 'dragon') {

        head.position.set(0, 7.5, 6.5); head.material = mat; head.parent = root; meshes.push(head);
        // Jaw
        const jaw = BABYLON.MeshBuilder.CreateBox('dJaw', {width:1.2, height:0.4, depth:2.0}, scene);
        jaw.position.set(0, 6.8, 6.5); jaw.material = mat; jaw.parent = root; meshes.push(jaw);
        // Eyes
        const dEyeMat = new BABYLON.StandardMaterial('dEye', scene);
        dEyeMat.emissiveColor = new BABYLON.Color3(1, 0.5, 0);
        [-0.5, 0.5].forEach(ex => {

            eye.position.set(ex, 7.8, 7.5); eye.material = dEyeMat; eye.parent = root; meshes.push(eye);

        // Horns

            const horn = BABYLON.MeshBuilder.CreateCylinder('horn', {diameterTop:0, diameterBottom:0.3, height:1.5, tessellation:5}, scene);
            horn.position.set(hx, 8.5, 5.5); horn.rotation.x = -0.6; horn.material = metalMat; horn.parent = root; meshes.push(horn);
        });
        // Wings
        [-1,1].forEach(side => {
            const wingBone = BABYLON.MeshBuilder.CreateBox('wBone', {width:8, height:0.3, depth:1}, scene);
            wingBone.position.set(side*6, 6, 0); wingBone.material = mat; wingBone.parent = root; meshes.push(wingBone);

function updateEnemies(dt) {
    enemies.forEach(e => {
        if (!e.alive) return;
        const dx = player.x - e.x, dz = player.z - e.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist < 20 && dist > 3) {
            const spd = 2 * dt;
            e.x += (dx/dist)*spd; e.z += (dz/dist)*spd;
            e.mesh.position.x = e.x; e.mesh.position.z = e.z;
            e.mesh.rotation = new BABYLON.Vector3(0, Math.atan2(dx, dz), 0);
        }
        if (dist < 4) {
            e.attackTimer -= dt;
            if (e.attackTimer <= 0) {
                const dmg = Math.max(1, e.atk - player.def + Math.floor(Math.random()*3));
                player.hp = Math.max(0, player.hp - dmg);
                addMessage(e.name + ' ataca: -' + dmg + ' HP');
                e.attackTimer = 2;
                if (player.hp <= 0) gameOver();
            }
        }
    });
}

// ── COMBAT ──
const skillCooldowns = [1.5, 8, 12, 15];
const skillMpCost = [0, 10, 15, 20];

function useSkill(idx) {
    if (player.cooldowns[idx] > 0) return;
    if (player.mp < skillMpCost[idx]) { addMessage('Mana insuficiente!'); return; }
    if (!targetEnemy || !targetEnemy.alive) {
        let nearest = null, nearDist = 20;
        enemies.forEach(e => {
            if (!e.alive) return;
            const dist = Math.sqrt((e.x-player.x)**2+(e.z-player.z)**2);
            if (dist < nearDist) { nearest = e; nearDist = dist; }
        });
        if (nearest) { targetEnemy = nearest; showEnemyInfo(nearest); }
        else { addMessage('Sem alvo!'); return; }
    }
    const dist = Math.sqrt((targetEnemy.x-player.x)**2+(targetEnemy.z-player.z)**2);
    const range = selectedChar === 2 ? 20 : selectedChar === 3 ? 18 : 5;
    if (dist > range) { addMessage('Muito longe!'); return; }
    player.mp = Math.max(0, player.mp - skillMpCost[idx]);
    player.cooldowns[idx] = skillCooldowns[idx];
    const h = heroData[selectedChar];
    let dmg = 0;
    switch(idx) {
        case 0: dmg = Math.max(1, player.atk - targetEnemy.def + Math.floor(Math.random()*5)); break;
        case 1: dmg = Math.max(1, player.atk*2 - targetEnemy.def + Math.floor(Math.random()*8)); break;
        case 2: dmg = Math.max(1, Math.floor(player.atk*1.5) + Math.floor(Math.random()*6)); break;
        case 3: player.hp = Math.min(player.maxHp, player.hp + Math.floor(player.maxHp*0.3)); addMessage(h.skills[3]+': Curou!'); return;
    }
    dealDamage(targetEnemy, dmg);
    addMessage(h.skills[idx] + ': -' + dmg + ' em ' + targetEnemy.name);
    createHitParticles(targetEnemy.x, 2, targetEnemy.z);
}

function dealDamage(enemy, dmg) {
    enemy.hp -= dmg;
    if (enemy.hp <= 0) {
        enemy.alive = false;
        enemy.meshes.forEach(m => m.dispose());
        enemy.mesh.dispose();
        player.xp += enemy.xp;
        addMessage(enemy.name + ' derrotado! +' + enemy.xp + ' XP');
        checkLevelUp();
        if (targetEnemy === enemy) { targetEnemy = null; document.getElementById('enemy-info').style.display = 'none'; }
    }
}

function createHitParticles(x, y, z) {
    const ps = new BABYLON.ParticleSystem('hit', 30, scene);
    ps.particleTexture = new BABYLON.Texture('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAA0SURBVChTY/j//z8DAwMDIwMEMIEpBgYGRgYIYAJTDAwMjAwQwASmGBgYGBkggAlMAQMAAPkABf8JlLIAAAAASUVORK5CYII=', scene);
    ps.emitter = new BABYLON.Vector3(x, y, z);
    ps.color1 = new BABYLON.Color4(1, 0.3, 0, 1);
    ps.color2 = new BABYLON.Color4(1, 0.8, 0, 0.8);
    ps.minSize = 0.1; ps.maxSize = 0.4;
    ps.minLifeTime = 0.2; ps.maxLifeTime = 0.5;
    ps.emitRate = 100;
    ps.direction1 = new BABYLON.Vector3(-2, 2, -2);
    ps.direction2 = new BABYLON.Vector3(2, 4, 2);
    ps.gravity = new BABYLON.Vector3(0, -5, 0);
    ps.start();
    setTimeout(() => { ps.stop(); setTimeout(() => ps.dispose(), 1000); }, 200);
}

function checkLevelUp() {
    while (player.xp >= player.xpNext) {
        player.xp -= player.xpNext;
        player.level++;
        player.xpNext = Math.floor(player.xpNext * 1.5);
        player.maxHp += 15; player.hp = player.maxHp;
        player.maxMp += 5; player.mp = player.maxMp;
        player.atk += 3; player.def += 2;
        addMessage('LEVEL UP! Nivel ' + player.level);
    }
}

// ── MUSIC (FM Synthesis) ──
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
function initAudio() {
    if (ac) return;
    ac = new AC(); ac.resume();
    const gain = ac.createGain(); gain.gain.value = 0.3; gain.connect(ac.destination);
    function playLoop() {
        if (!gameStarted) return;
        const t = ac.currentTime;
        const notes = [130,147,165,147,130,110,130,165,196,175];
        let mt = t;
        notes.forEach(freq => {
            const mod = ac.createOscillator(), modG = ac.createGain();
            mod.frequency.value = freq*2; modG.gain.value = freq*0.3;
            const car = ac.createOscillator(); car.frequency.value = freq;
            mod.connect(modG); modG.connect(car.frequency);
            const env = ac.createGain();
            env.gain.setValueAtTime(0, mt);
            env.gain.linearRampToValueAtTime(0.06, mt+0.3);
            env.gain.linearRampToValueAtTime(0, mt+2);
            car.connect(env); env.connect(gain);
            mod.start(mt); car.start(mt); mod.stop(mt+2); car.stop(mt+2);
            mt += 2;
        });
        setTimeout(playLoop, 20000);
    }
    playLoop();
}

// ── FIRST PERSON MODE ──
let fpMode = false, fpCamera = null;

function toggleFPMode() {
    fpMode = !fpMode;
    if (fpMode) {
        addMessage('Primeira Pessoa | V: voltar | Clique: alvo');
        document.getElementById('crosshair').style.display = 'block';
        fpCamera = new BABYLON.FreeCamera('fpCam', new BABYLON.Vector3(player.x, 4, player.z), scene);
        fpCamera.rotation.y = playerMesh.rotation.y;
        fpCamera.minZ = 0.1;
        scene.activeCamera = fpCamera;
        const canvas = document.getElementById('renderCanvas');
        canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
        canvas.requestPointerLock();
        // Mouse look
        fpCamera.inputs.clear();
        document.addEventListener('mousemove', fpMouseMove);
    } else {
        addMessage('Terceira Pessoa');
        document.getElementById('crosshair').style.display = 'none';
        scene.activeCamera = camera;
        camera.target.copyFrom(playerMesh.position);
        document.removeEventListener('mousemove', fpMouseMove);
        document.exitPointerLock();
    }
}

function fpMouseMove(e) {
    if (!fpMode || !fpCamera) return;
    fpCamera.rotation.y += e.movementX * 0.002;
    fpCamera.rotation.x += e.movementY * 0.002;
    fpCamera.rotation.x = Math.max(-1.2, Math.min(1.2, fpCamera.rotation.x));
}

function updateFP(dt) {
    if (!fpMode || !fpCamera) return;
    const spd = player.spd * dt * 6;
    const yaw = fpCamera.rotation.y;
    let mx = 0, mz = 0;
    if (keys['KeyW']) { mx += Math.sin(yaw)*spd; mz += Math.cos(yaw)*spd; }
    if (keys['KeyS']) { mx -= Math.sin(yaw)*spd; mz -= Math.cos(yaw)*spd; }
    if (keys['KeyA']) { mx += Math.sin(yaw-Math.PI/2)*spd; mz += Math.cos(yaw-Math.PI/2)*spd; }
    if (keys['KeyD']) { mx += Math.sin(yaw+Math.PI/2)*spd; mz += Math.cos(yaw+Math.PI/2)*spd; }
    player.x += mx; player.z += mz;
    fpCamera.position.x = player.x;
    fpCamera.position.z = player.z;
    fpCamera.position.y = 4;
    playerMesh.position.x = player.x;
    playerMesh.position.z = player.z;
}

        bodyMat.albedoColor = new BABYLON.Color3(0.4, 0.25, 0.1); bodyMat.roughness = 0.8;
        const body = BABYLON.MeshBuilder.CreateBox('hBody', {width:1.2, height:1.0, depth:2.5}, scene);
        body.position.y = 1.5; body.material = bodyMat; body.parent = mountMesh;
        const head = BABYLON.MeshBuilder.CreateBox('hHead', {width:0.5, height:0.6, depth:1.0}, scene);
        head.position.set(0, 2.2, 1.5); head.material = bodyMat; head.parent = mountMesh;
        const neck = BABYLON.MeshBuilder.CreateBox('hNeck', {width:0.4, height:0.8, depth:0.4}, scene);
        neck.position.set(0, 2.0, 1.0); neck.material = bodyMat; neck.parent = mountMesh;
        // 4 legs
        [[-0.4,0.8],[-0.4,-0.8],[0.4,0.8],[0.4,-0.8]].forEach(([lx,lz]) => {
            const leg = BABYLON.MeshBuilder.CreateBox('hLeg', {width:0.2, height:1.2, depth:0.2}, scene);
            leg.position.set(lx, 0.6, lz); leg.material = bodyMat; leg.parent = mountMesh;
        });
        mountMesh.scaling = new BABYLON.Vector3(2, 2, 2);
        mountMesh.position.set(player.x, 0, player.z);
        addMessage('Montou! Velocidade dobrada!');
    }
}

// ── REGIONS ──
const regions = [
    {name:'O Condado', x:0, z:0, radius:30, color:[0.3,0.5,0.2]},
    {name:'Rohan', x:50, z:30, radius:35, color:[0.6,0.5,0.2]},
    {name:'Mordor', x:80, z:-70, radius:40, color:[0.15,0.05,0.02]},
    {name:'Rivendell', x:-60, z:-35, radius:30, color:[0.2,0.4,0.5]},
    {name:'Mirkwood', x:-50, z:60, radius:35, color:[0.1,0.25,0.1]}
];
let currentRegion = '';

function getRegion(x, z) {
    for (const r of regions) {
        const dist = Math.sqrt((x-r.x)**2 + (z-r.z)**2);
        if (dist < r.radius) return r.name;
    }
    return 'Terras Selvagens';
}

function updateRegion() {
    const r = getRegion(player.x, player.z);
    if (r !== currentRegion) {
        currentRegion = r;
        addMessage('Regiao: ' + r);
    }
}

// ── LOOT SYSTEM ──
let lootItems = [];

function spawnLoot() {
    for (let i = 0; i < 15; i++) {
        const x = (Math.random()-0.5)*MAP_SIZE*1.5;
        const z = (Math.random()-0.5)*MAP_SIZE*1.5;
        const type = Math.random() < 0.5 ? 'hp' : 'mp';
        const mat = new BABYLON.StandardMaterial('lootMat'+i, scene);
        mat.emissiveColor = type === 'hp' ? new BABYLON.Color3(1,0.2,0.2) : new BABYLON.Color3(0.2,0.2,1);
        mat.disableLighting = true;
        const mesh = BABYLON.MeshBuilder.CreateSphere('loot'+i, {diameter:0.8}, scene);
        mesh.position.set(x, 1.5, z); mesh.material = mat;
        lootItems.push({mesh, x, z, type, collected:false});
    }
}

function checkLoot() {
    lootItems.forEach(l => {
        if (l.collected) return;
        const dist = Math.sqrt((l.x-player.x)**2+(l.z-player.z)**2);
        if (dist < 3) {
            l.collected = true;
            l.mesh.dispose();
            if (l.type === 'hp') {
                const heal = Math.floor(player.maxHp*0.2);
                player.hp = Math.min(player.maxHp, player.hp+heal);
                addMessage('Pocao de Vida: +'+heal+' HP');
            } else {
                const mana = Math.floor(player.maxMp*0.3);
                player.mp = Math.min(player.maxMp, player.mp+mana);
                addMessage('Pocao de Mana: +'+mana+' MP');
            }
        }
    });
    // Animate loot bobbing
    lootItems.forEach(l => {
        if (!l.collected) l.mesh.position.y = 1.5 + Math.sin(Date.now()*0.003 + l.x)*0.3;
    });
}

// ── DRAGON FIRE BREATH ──
let dragonFirePS = null;

function createDragonFire(dragon) {
    if (!dragon || !dragon.alive) return;
    dragonFirePS = new BABYLON.ParticleSystem('dragonFire', 100, scene);
    dragonFirePS.particleTexture = new BABYLON.Texture('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAA0SURBVChTY/j//z8DAwMDIwMEMIEpBgYGRgYIYAJTDAwMjAwQwASmGBgYGBkggAlMAQMAAPkABf8JlLIAAAAASUVORK5CYII=', scene);
    dragonFirePS.emitter = new BABYLON.Vector3(dragon.x, 7, dragon.z+5);
    dragonFirePS.minEmitBox = new BABYLON.Vector3(-0.3, -0.3, 0);
    dragonFirePS.maxEmitBox = new BABYLON.Vector3(0.3, 0.3, 0);
    dragonFirePS.color1 = new BABYLON.Color4(1, 0.4, 0, 1);
    dragonFirePS.color2 = new BABYLON.Color4(1, 0.8, 0, 0.6);
    dragonFirePS.colorDead = new BABYLON.Color4(0.2, 0, 0, 0);
    dragonFirePS.minSize = 0.3; dragonFirePS.maxSize = 1.0;
    dragonFirePS.minLifeTime = 0.3; dragonFirePS.maxLifeTime = 0.8;
    dragonFirePS.emitRate = 60;
    dragonFirePS.direction1 = new BABYLON.Vector3(-1, 0.5, 3);
    dragonFirePS.direction2 = new BABYLON.Vector3(1, 1, 5);
    dragonFirePS.gravity = new BABYLON.Vector3(0, -1, 0);
    dragonFirePS.start();
}

function updateDragonFire() {
    const dragon = enemies.find(e => e.type === 'dragon' && e.alive);
    if (!dragon) { if (dragonFirePS) { dragonFirePS.stop(); dragonFirePS.dispose(); dragonFirePS = null; } return; }
    const dist = Math.sqrt((dragon.x-player.x)**2+(dragon.z-player.z)**2);
    if (dist < 15 && !dragonFirePS) {
        createDragonFire(dragon);
    } else if (dist >= 15 && dragonFirePS) {
        dragonFirePS.stop(); dragonFirePS.dispose(); dragonFirePS = null;
    }
    if (dragonFirePS) {
        dragonFirePS.emitter = new BABYLON.Vector3(dragon.x, 7, dragon.z + 3);
    }
}

// ── DYNAMIC MUSIC ──
let musicState = 'peace';

function updateMusic() {
    if (!ac) return;
    let nearestDist = 999;
    enemies.forEach(e => {
        if (!e.alive) return;
        const dist = Math.sqrt((e.x-player.x)**2+(e.z-player.z)**2);
        if (dist < nearestDist) nearestDist = dist;
    });
    const newState = nearestDist < 8 ? 'combat' : nearestDist < 20 ? 'suspense' : 'peace';
    if (newState !== musicState) {
        musicState = newState;
        playMusicState();
    }
}

function playMusicState() {
    if (!ac) return;
    const gain = ac.createGain(); gain.gain.value = 0.15; gain.connect(ac.destination);
    const t = ac.currentTime;
    if (musicState === 'combat') {
        // Aggressive drums + brass
        for (let i=0; i<4; i++) {
            const osc = ac.createOscillator();
            osc.frequency.setValueAtTime(55, t+i*0.5);
            osc.frequency.exponentialRampToValueAtTime(28, t+i*0.5+0.15);
            const env = ac.createGain();
            env.gain.setValueAtTime(0.3, t+i*0.5);
            env.gain.exponentialRampToValueAtTime(0.01, t+i*0.5+0.2);
            osc.connect(env); env.connect(gain);
            osc.start(t+i*0.5); osc.stop(t+i*0.5+0.3);
        }
    } else if (musicState === 'suspense') {
        // Dark drone
        const osc = ac.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 65;
        const env = ac.createGain();
        env.gain.setValueAtTime(0, t); env.gain.linearRampToValueAtTime(0.05, t+1); env.gain.linearRampToValueAtTime(0, t+4);
        osc.connect(env); env.connect(gain);
        osc.start(t); osc.stop(t+4);
    }
}

// ── START ──
document.querySelectorAll('.intro-card').forEach(card => {
    card.addEventListener('click', () => { startGameWithChar(parseInt(card.dataset.char)); initAudio(); });
});
