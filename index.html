<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terra-Media 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;color:#fff}
canvas{display:block}
#intro{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,#1a0a2e 0%,#000 100%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
#intro h1{color:#FFD700;font-size:3.2rem;text-shadow:0 0 40px rgba(255,150,0,0.8),0 4px 8px rgba(0,0,0,0.8);letter-spacing:8px;opacity:0;animation:fadeIn 2s 0.5s forwards}
#intro p{color:#ccc;margin-top:15px;font-style:italic;opacity:0;animation:fadeIn 2s 2s forwards}
#cards{display:flex;gap:15px;margin-top:30px;opacity:0;animation:fadeIn 1s 3s forwards}
.card{padding:20px 28px;background:rgba(20,10,40,0.8);border:2px solid #555;border-radius:12px;cursor:pointer;text-align:center;transition:all 0.3s}
.card:hover{border-color:#FFD700;transform:translateY(-8px) scale(1.05);box-shadow:0 12px 35px rgba(255,215,0,0.4)}
.card h3{font-size:1.1rem;margin-bottom:4px}
.card span{color:#aaa;font-size:0.75rem}
@keyframes fadeIn{to{opacity:1}}
#hud{display:none;position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
#hud>*{pointer-events:auto}
#stats{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.8);border:1px solid #555;border-radius:10px;padding:12px 16px}
#stats h3{color:#FFD700;font-size:14px;margin-bottom:6px}
.bar{width:180px;height:16px;background:#111;border-radius:8px;margin:4px 0;position:relative;overflow:hidden;border:1px solid #333}
.bar-fill{height:100%;border-radius:7px;transition:width 0.3s}
.bar-hp .bar-fill{background:linear-gradient(to right,#8B0000,#FF2222)}
.bar-mp .bar-fill{background:linear-gradient(to right,#000080,#2266FF)}
.bar-label{position:absolute;top:0;left:0;width:100%;text-align:center;font-size:10px;line-height:16px;color:#fff;text-shadow:1px 1px #000;font-weight:bold}
#xpbar{width:180px;height:8px;background:#111;border-radius:4px;margin-top:6px;border:1px solid #333}
#xpfill{height:100%;background:linear-gradient(to right,#8B8B00,#FFD700);border-radius:3px;width:0%}
#lvl{color:#FFD700;font-size:11px;margin-top:4px;font-weight:bold}
#skills{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.sk{width:54px;height:54px;background:rgba(0,0,0,0.85);border:2px solid #555;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all 0.2s}
.sk:hover{border-color:#FFD700;transform:translateY(-3px)}
.sk .i{font-size:18px;font-weight:bold}
.sk .k{font-size:9px;color:#888}
.sk .cd{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);border-radius:8px;display:none;line-height:54px;text-align:center;color:#fff;font-size:12px}
#ebar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:2px solid #880000;border-radius:10px;padding:8px 20px;display:none;text-align:center}
#ebar h4{color:#FF4444;font-size:14px}
#ehp{width:220px;height:12px;background:#111;border-radius:6px;margin-top:5px;border:1px solid #333}
#ehpf{height:100%;background:linear-gradient(to right,#880000,#FF2200);border-radius:5px;transition:width 0.2s}
#log{position:absolute;bottom:90px;left:20px;max-width:320px;pointer-events:none}
.msg{font-size:12px;padding:4px 0;text-shadow:1px 1px 3px #000;opacity:1;transition:opacity 1s}
#map{position:absolute;top:10px;right:10px;width:150px;height:150px;border:2px solid #555;border-radius:8px;background:rgba(0,0,0,0.7)}
#newbtn{position:absolute;top:172px;right:10px;padding:7px 14px;background:rgba(0,0,0,0.8);color:#FFD700;border:1px solid #FFD700;border-radius:8px;cursor:pointer;font-size:11px}
#dlg{display:none;position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:480px;background:rgba(10,5,20,0.95);border:2px solid #FFD700;border-radius:14px;padding:20px;text-align:center}
#dlg h3{color:#FFD700;margin-bottom:10px;font-size:1.2rem}
#dlg p{color:#ddd;font-size:13px;margin-bottom:14px;line-height:1.4}
#dlg button{padding:9px 22px;background:#1a0a2e;color:#FFD700;border:1px solid #FFD700;border-radius:8px;cursor:pointer;margin:0 6px;font-size:12px}
</style>
</head>
<body>
<div id="intro">
<h1>TERRA-MEDIA</h1>
<p>Clique em um heroi para iniciar sua jornada</p>
<div id="cards">
<div class="card" onclick="start(0)"><h3 style="color:#FFD700">Bernardino</h3><span>Barbaro</span></div>
<div class="card" onclick="start(1)"><h3 style="color:#48F">Bernardo</h3><span>Guerreiro</span></div>
<div class="card" onclick="start(2)"><h3 style="color:#4A4">Raphael</h3><span>Arqueiro</span></div>
<div class="card" onclick="start(3)"><h3 style="color:#C4F">Leticia</h3><span>Maga</span></div>
</div>
</div>
<div id="hud">
<div id="stats"><h3 id="pname">Heroi</h3>
<div class="bar bar-hp"><div class="bar-fill" id="hpf" style="width:100%"></div><div class="bar-label" id="hpl">100/100</div></div>
<div class="bar bar-mp"><div class="bar-fill" id="mpf" style="width:100%"></div><div class="bar-label" id="mpl">50/50</div></div>
<div id="xpbar"><div id="xpfill"></div><div id="lvl">Nivel 1</div></div>
<div id="ebar"><h4 id="ename"></h4><div id="ehp"><div id="ehpf"></div></div></div>
<div id="skills">
<div class="sk" onclick="skill(0)"><span class="i">I</span><span class="k">1</span><div class="cd"></div></div>
<div class="sk" onclick="skill(1)"><span class="i">II</span><span class="k">2</span><div class="cd"></div></div>
<div class="sk" onclick="skill(2)"><span class="i">III</span><span class="k">3</span><div class="cd"></div></div>
<div class="sk" onclick="skill(3)"><span class="i">IV</span><span class="k">4</span><div class="cd"></div></div>
</div>
<div id="log"></div>
<canvas id="map" width="150" height="150"></canvas>
<button id="newbtn" onclick="location.reload()">Novo Personagem</button>
<div id="dlg"><h3 id="dn"></h3><p id="dt"></p><button onclick="document.getElementById('dlg').style.display='none';msg('Quest aceita!')">Aceitar</button><button onclick="document.getElementById('dlg').style.display='none'">Fechar</button></div>
</div>
<script>
const H=[{name:'Bernardino',cls:'Barbaro',hp:120,mp:30,atk:18,def:8,spd:5,color:0xCC6622,skills:['Golpe Brutal','Furia','Grito de Guerra','Regenerar']},{name:'Bernardo',cls:'Guerreiro',hp:150,mp:40,atk:14,def:14,spd:4,color:0x3366CC,skills:['Investida','Escudo','Provocar','Cura Divina']},{name:'Raphael',cls:'Arqueiro',hp:90,mp:50,atk:16,def:6,spd:7,color:0x33AA55,skills:['Flecha','Chuva de Flechas','Armadilha','Evasao']},{name:'Leticia',cls:'Maga',hp:80,mp:80,atk:20,def:5,spd:4,color:0xAA44DD,skills:['Bola de Fogo','Nevasca','Raio','Cura Arcana']}];
const ED=[{name:'Orc',type:'orc',hp:60,atk:8,def:4,xp:30,color:0x446633},{name:'Orc',type:'orc',hp:60,atk:8,def:4,xp:30,color:0x446633},{name:'Orc',type:'orc',hp:60,atk:8,def:4,xp:30,color:0x446633},{name:'Nazgul',type:'nazgul',hp:120,atk:15,def:8,xp:80,color:0x1a1a2e},{name:'Nazgul',type:'nazgul',hp:120,atk:15,def:8,xp:80,color:0x1a1a2e},{name:'Gollum',type:'gollum',hp:40,atk:6,def:2,xp:40,color:0x7A8A55},{name:'Saruman',type:'saruman',hp:200,atk:20,def:12,xp:200,color:0xDDDDD},{name:'Smaug',type:'dragon',hp:500,atk:35,def:20,xp:500,color:0xBB3311}];
const EP=[[25,25],[40,10],[-35,25],[55,-35],[-55,-45],[65,55],[-75,75],[90,-80]];
const ND=[{name:'Gandalf',x:-12,z:-50,color:0xCCCCCC,quest:'Derrote 3 Orcs nas redondezas.'},{name:'Aragorn',x:12,z:-50,color:0x5A3A1A,quest:'Elimine 2 Nazgul nas planicies.'},{name:'Legolas',x:-35,z:35,color:0x44AA55,quest:'Rastreie e capture Gollum.'},{name:'Frodo',x:35,z:35,color:0x8B6914,quest:'Derrote o dragao Smaug!'}];
let sc,cam,renderer,player,pMesh,enemies=[],npcs=[],loot=[],target=null;
let keys={},wt=0,moving=false,mounted=false,mMesh=null,baseSpd=0;
let MAP=100,running=false,charIdx=0,camAngle=Math.PI,camDist=20;
const celVert=`varying vec3 vNormal;varying vec3 vViewDir;void main(){vNormal=normalize(normalMatrix*normal);vec4 mvPos=modelViewMatrix*vec4(position,1.0);vViewDir=normalize(-mvPos.xyz);gl_Position=projectionMatrix*mvPos;}`;
const celFrag=`uniform vec3 uColor;varying vec3 vNormal;varying vec3 vViewDir;void main(){vec3 light=normalize(vec3(0.5,1.0,0.3));float d=dot(normalize(vNormal),light);float i=d>0.5?1.0:d>0.2?0.65:d>-0.1?0.4:0.25;float rim=1.0-max(0.0,dot(normalize(vNormal),vViewDir));rim=smoothstep(0.55,1.0,rim)*0.4;vec3 col=uColor*i+vec3(1.0,0.9,0.8)*rim;gl_FragColor=vec4(col,1.0);}`;
function celMat(color){const c=new THREE.Color(color);return new THREE.ShaderMaterial({uniforms:{uColor:{value:c}},vertexShader:celVert,fragmentShader:celFrag});}
function start(ci){charIdx=ci;document.getElementById('intro').style.display='none';document.getElementById('hud').style.display='block';const h=H[ci];player={x:0,z:0,hp:h.hp,maxHp:h.hp,mp:h.mp,maxMp:h.mp,xp:0,xpNext:100,level:1,atk:h.atk,def:h.def,spd:h.spd,cd:[0,0,0,0]};document.getElementById('pname').textContent=h.name+' - '+h.cls;init();running=true;msg('Bem-vindo, '+h.name+'!');msg('WASD mover | 1-4 skills | Clique alvo | E NPC | M montar');}
function init(){
sc=new THREE.Scene();sc.background=new THREE.Color(0x88CCEE);sc.fog=new THREE.FogExp2(0x88CCEE,0.006);
cam=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,500);
renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.3;document.body.appendChild(renderer.domElement);
const sun=new THREE.DirectionalLight(0xFFF0DD,1.8);sun.position.set(40,60,30);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-100;sun.shadow.camera.right=100;sun.shadow.camera.top=100;sun.shadow.camera.bottom=-100;sc.add(sun);
sc.add(new THREE.HemisphereLight(0x99CCFF,0x557744,0.7));
const gGeo=new THREE.PlaneGeometry(MAP*2,MAP*2,60,60);gGeo.rotateX(-Math.PI/2);
const pos=gGeo.attributes.position;const colors=[];
for(let i=0;i<pos.count;i++){pos.setY(i,Math.sin(pos.getX(i)*0.05)*1.5+Math.cos(pos.getZ(i)*0.04)*1.2+Math.random()*0.3);const g=0.35+Math.random()*0.2;colors.push(0.15+Math.random()*0.1,g,0.08+Math.random()*0.06);}
gGeo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));gGeo.computeVertexNormals();
const ground=new THREE.Mesh(gGeo,new THREE.MeshLambertMaterial({vertexColors:true}));ground.receiveShadow=true;sc.add(ground);
for(let i=0;i<100;i++){const x=(Math.random()-0.5)*MAP*1.8,z=(Math.random()-0.5)*MAP*1.8;if(Math.abs(x)<12&&Math.abs(z)<12)continue;mkTree(x,z);}
for(let i=0;i<50;i++)mkRock((Math.random()-0.5)*MAP*1.8,(Math.random()-0.5)*MAP*1.8);
mkCastle();mkPlayer();
ED.forEach((d,i)=>{enemies.push(mkEnemy(d,EP[i][0],EP[i][1]));});
ND.forEach(d=>{npcs.push(mkNPC(d));});
for(let i=0;i<15;i++){const x=(Math.random()-0.5)*MAP*1.5,z=(Math.random()-0.5)*MAP*1.5;const type=Math.random()<0.5?'hp':'mp';const m=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),new THREE.MeshBasicMaterial({color:type==='hp'?0xFF4444:0x4444FF}));m.position.set(x,1.5,z);sc.add(m);loot.push({mesh:m,x,z,type,got:false});}
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Digit1')skill(0);if(e.code==='Digit2')skill(1);if(e.code==='Digit3')skill(2);if(e.code==='Digit4')skill(3);if(e.code==='KeyE')talkNPC();if(e.code==='KeyM')toggleMount();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
renderer.domElement.addEventListener('click',onClick);
window.addEventListener('resize',()=>{cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
let drag=false,lx=0;window.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mousedown',e=>{if(e.button===2){drag=true;lx=e.clientX;}});
window.addEventListener('mouseup',()=>{drag=false;});
window.addEventListener('mousemove',e=>{if(drag){camAngle+=(e.clientX-lx)*0.008;lx=e.clientX;}});
window.addEventListener('wheel',e=>{camDist=Math.max(8,Math.min(40,camDist+e.deltaY*0.02));});
animate();}
function mkTree(x,z){const h=4+Math.random()*4;const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.4,h,8),celMat(0x5C3317));trunk.position.set(x,h/2,z);trunk.castShadow=true;sc.add(trunk);for(let i=0;i<3;i++){const s=2.5+Math.random()*2;const leaf=new THREE.Mesh(new THREE.SphereGeometry(s,10,8),celMat(0x228B22+(Math.floor(Math.random()*0x335500))));leaf.position.set(x+(Math.random()-0.5)*1.5,h+1+i*1.5,z+(Math.random()-0.5)*1.5);leaf.castShadow=true;sc.add(leaf);}}
function mkRock(x,z){const s=0.6+Math.random()*2;const r=new THREE.Mesh(new THREE.DodecahedronGeometry(s,1),celMat(0x777777+(Math.floor(Math.random()*0x222222))));r.position.set(x,s*0.4,z);r.rotation.set(Math.random(),Math.random(),0);r.castShadow=true;sc.add(r);}
function mkCastle(){const wm=celMat(0x9B8B75);[[-15,-40],[15,-40],[15,-60],[-15,-60]].forEach(([tx,tz])=>{const t=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.5,16,10),wm);t.position.set(tx,8,tz);t.castShadow=true;sc.add(t);const rf=new THREE.Mesh(new THREE.ConeGeometry(3.2,5,10),celMat(0x992222));rf.position.set(tx,18.5,tz);sc.add(rf);});const w1=new THREE.Mesh(new THREE.BoxGeometry(34,10,2.5),wm);w1.position.set(0,5,-40);w1.castShadow=true;sc.add(w1);const w2=w1.clone();w2.position.z=-60;sc.add(w2);const w3=new THREE.Mesh(new THREE.BoxGeometry(2.5,10,22),wm);w3.position.set(-15,5,-50);sc.add(w3);const w4=w3.clone();w4.position.x=15;sc.add(w4);}
let limbs={};
function mkPlayer(){const h=H[charIdx];pMesh=new THREE.Group();
const body=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,1.2,10),celMat(h.color));body.position.y=1.6;body.castShadow=true;pMesh.add(body);
const head=new THREE.Mesh(new THREE.SphereGeometry(0.45,12,10),celMat(0xF5C6A0));head.position.y=2.6;head.castShadow=true;pMesh.add(head);
[-0.15,0.15].forEach(ex=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8),new THREE.MeshBasicMaterial({color:0xFFFFFF}));e.position.set(ex,2.65,0.35);pMesh.add(e);const p=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),new THREE.MeshBasicMaterial({color:0x222222}));p.position.set(ex,2.65,0.4);pMesh.add(p);});
const hair=new THREE.Mesh(new THREE.SphereGeometry(0.48,12,10,0,Math.PI*2,0,Math.PI*0.6),celMat(0x2A1506));hair.position.y=2.75;hair.rotation.x=-0.2;pMesh.add(hair);
const lAP=new THREE.Group();lAP.position.set(-0.6,2.0,0);pMesh.add(lAP);
const lA=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.9,8),celMat(h.color));lA.position.y=-0.45;lA.castShadow=true;lAP.add(lA);
const lH=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),celMat(0xF5C6A0));lH.position.y=-0.95;lAP.add(lH);
const rAP=new THREE.Group();rAP.position.set(0.6,2.0,0);pMesh.add(rAP);
const rA=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,0.9,8),celMat(h.color));rA.position.y=-0.45;rA.castShadow=true;rAP.add(rA);
const rH=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),celMat(0xF5C6A0));rH.position.y=-0.95;rAP.add(rH);
const lLP=new THREE.Group();lLP.position.set(-0.2,1.0,0);pMesh.add(lLP);
const lL=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,0.9,8),celMat(h.color));lL.position.y=-0.45;lL.castShadow=true;lLP.add(lL);
const rLP=new THREE.Group();rLP.position.set(0.2,1.0,0);pMesh.add(rLP);
const rL=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,0.9,8),celMat(h.color));rL.position.y=-0.45;rL.castShadow=true;rLP.add(rL);
[-0.2,0.2].forEach(bx=>{const b=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.18,0.25,8),celMat(0x3D1F00));b.position.set(bx,0.12,0);pMesh.add(b);});
if(charIdx===0){const ax=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.6,0.4),celMat(0xBBBCC));ax.position.set(0,0.2,0.2);rAP.add(ax);}
else if(charIdx===1){const sw=new THREE.Mesh(new THREE.BoxGeometry(0.06,1.4,0.04),celMat(0xCCCCDD));sw.position.set(0,-0.1,0.2);rAP.add(sw);}
else if(charIdx===2){const bw=new THREE.Mesh(new THREE.TorusGeometry(0.4,0.04,8,16),celMat(0x8B5A2B));bw.position.set(0,-0.3,0.2);bw.rotation.z=Math.PI/2;lAP.add(bw);}
else{const st=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,2.2,8),celMat(0x5C3317));st.position.set(0,0.3,0.1);rAP.add(st);const cr=new THREE.Mesh(new THREE.SphereGeometry(0.15,10,10),new THREE.MeshBasicMaterial({color:0xB33FF}));cr.position.set(0,1.5,0.1);rAP.add(cr);}
limbs={lAP,rAP,lLP,rLP};pMesh.scale.set(2.5,2.5,2.5);sc.add(pMesh);}
function mkEnemy(data,x,z){const g=new THREE.Group();const mat=celMat(data.color);const meshes=[];
if(data.type==='dragon'){const body=new THREE.Mesh(new THREE.CylinderGeometry(1.5,2,7,10),mat);body.position.y=5;body.rotation.x=Math.PI/2;body.castShadow=true;g.add(body);meshes.push(body);const head=new THREE.Mesh(new THREE.SphereGeometry(1.2,10,8),mat);head.position.set(0,6,5);head.castShadow=true;g.add(head);meshes.push(head);[-1,1].forEach(s=>{const w=new THREE.Mesh(new THREE.BoxGeometry(8,0.2,4),mat);w.position.set(s*5,5.5,0);g.add(w);meshes.push(w);});const em=new THREE.MeshBasicMaterial({color:0xFF6600});[-0.4,0.4].forEach(ex=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),em);e.position.set(ex,6.5,5.8);g.add(e);meshes.push(e);});g.scale.set(2.8,2.8,2.8);}
else{const sc2=data.type==='gollum'?0.7:data.type==='saruman'?1.1:1;const body=new THREE.Mesh(new THREE.CylinderGeometry(0.35*sc2,0.4*sc2,1.1*sc2,10),mat);body.position.y=1.55*sc2;body.castShadow=true;g.add(body);meshes.push(body);const head=new THREE.Mesh(new THREE.SphereGeometry(0.35*sc2,10,8),mat);head.position.y=2.4*sc2;g.add(head);meshes.push(head);const em=new THREE.MeshBasicMaterial({color:0xFF0000});[-0.1,0.1].forEach(ex=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.06*sc2,8,8),em);e.position.set(ex*sc2,2.5*sc2,0.3*sc2);g.add(e);meshes.push(e);});[-0.45,0.45].forEach(ax=>{const a=new THREE.Mesh(new THREE.CylinderGeometry(0.1*sc2,0.12*sc2,0.8*sc2,8),mat);a.position.set(ax*sc2,1.4*sc2,0);g.add(a);meshes.push(a);});[-0
